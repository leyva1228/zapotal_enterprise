spring:
  application:
    name: zapotal-pdf-worker

  # Email via SMTP (compatible con Resend, Mailgun, SES, etc)
  mail:
    host: ${SMTP_HOST:smtp.resend.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USER:resend}
    password: ${SMTP_PASSWORD:re_xxx}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 10000
          timeout: 10000
          writetimeout: 10000

server:
  port: ${PORT:8081}
  compression:
    enabled: true
  tomcat:
    threads:
      max: 50

# Endpoints de salud y metricas para Render
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

# Configuracion especifica del worker
app:
  internal:
    # API key compartida con Django. En Render se setea via env var
    # INTERNAL_API_KEY. La longitud minima es 32 chars para evitar fuerza bruta.
    api-key: ${INTERNAL_API_KEY:dev-only-internal-key-change-me-in-prod-please-32-chars}
  email:
    # From: el email desde el que salen las boletas
    from: ${EMAIL_FROM:noreply@comunidadzapotal.org}

# Logging mas limpio en produccion
logging:
  level:
    root: INFO
    org.zapotal: INFO
    org.springframework: WARN
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
