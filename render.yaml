# ============================================================================
# Render Blueprint - Comunidad Zapotal
# ============================================================================
# Arquitectura:
#   - zapotal-backend  (Web Service Django + gunicorn, plan starter)
#   - zapotal-pdf-worker (Microservicio Spring Boot para PDFs async, Docker)
#   - zapotal-db       (Postgres database, plan starter)
#
# Para deployar: en el dashboard de Render, "New > Blueprint",
# apuntar al repo leyva1228/zapotal_enterprise, branch master.
# Render detectara este render.yaml automaticamente.
# ============================================================================

services:
  # ---------- Web service: Django backend ----------
  - type: web
    name: zapotal-backend
    runtime: python
    plan: starter
    region: oregon
    branch: main
    # rootDir indica a Render donde esta el codigo Django dentro del monorepo.
    rootDir: comunidad_zapotal_backend
    buildCommand: |
      pip install --upgrade pip &&
      pip install -r requirements.txt &&
      python manage.py collectstatic --noinput &&
      python manage.py migrate
    startCommand: |
      gunicorn zapotal_config.wsgi:application --bind 0.0.0.0:$PORT --workers 3 --timeout 60 --access-logfile - --error-logfile -
    healthCheckPath: /health/
    autoDeploy: true
    envVars:
      - key: DJANGO_DEBUG
        value: "False"

      - key: DJANGO_ALLOWED_HOSTS
        value: "api.comunidadzapotal.org,comunidadzapotal.org,www.comunidadzapotal.org,localhost,127.0.0.1"

      - key: CORS_ALLOWED_ORIGINS
        value: "https://comunidadzapotal.org,https://www.comunidadzapotal.org,http://localhost:5173"

      - key: CSRF_TRUSTED_ORIGINS
        value: "https://comunidadzapotal.org,https://www.comunidadzapotal.org,http://localhost:5173"

      - key: SECURE_SSL_REDIRECT
        value: "True"
      - key: SESSION_COOKIE_SECURE
        value: "True"
      - key: CSRF_COOKIE_SECURE
        value: "True"
      - key: SECURE_PROXY_SSL_HEADER
        value: "True"
      - key: WHITENOISE_USE_FINDERS_NORMALIZE
        value: "True"

      - key: DJANGO_SETTINGS_MODULE
        value: zapotal_config.settings

      # URL de conexion a la base de datos Postgres de Render.
      # fromDatabase: referencia a la base de datos definida en el array
      # 'databases' mas abajo. property: connectionString es la URL
      # completa postgresql://user:pass@host:port/db.
      - key: DATABASE_URL
        fromDatabase:
          name: zapotal-db
          property: connectionString

      # Las siguientes variables son SECRETAS. Render las pedira
      # en el dashboard al crear el Blueprint. NO hardcodear en este archivo.
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: MERCADO_PAGO_ACCESS_TOKEN
        sync: false
      - key: MERCADO_PAGO_PUBLIC_KEY
        sync: false
      - key: MERCADO_PAGO_WEBHOOK_SECRET
        sync: false
      - key: CLOUDFLARE_R2_ACCESS_KEY_ID
        sync: false
      - key: CLOUDFLARE_R2_SECRET_ACCESS_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: TURNSTILE_SECRET_KEY
        sync: false

      # Microservicio PDF worker (Spring Boot). Django le delega la
      # generacion del PDF + email via HTTP. Si no esta accesible,
      # hace fallback local con xhtml2pdf.
      - key: INTERNAL_API_KEY
        sync: false  # mismo valor que el PDF worker
      - key: PDF_WORKER_URL
        value: "https://zapotal-pdf-worker.onrender.com"

  # ---------- PDF worker (Spring Boot, Docker) ----------
  # Microservicio async que genera boletas de donacion en PDF y las envia
  # por email. Django lo invoca en background con X-Internal-API-Key.
  # Docker detecta el Dockerfile en spring-services/pdf-worker/ automaticamente.
  - type: web
    name: zapotal-pdf-worker
    runtime: docker
    plan: starter
    region: oregon
    branch: main
    rootDir: spring-services/pdf-worker
    dockerfilePath: Dockerfile
    healthCheckPath: /api/v1/internal/health
    autoDeploy: true
    envVars:
      - key: PORT
        value: "8081"
      - key: INTERNAL_API_KEY
        sync: false  # Render pedira el valor; debe coincidir con el de Django
      - key: SMTP_HOST
        value: "smtp.resend.com"
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: "resend"
      - key: SMTP_PASSWORD
        sync: false
      - key: EMAIL_FROM
        value: "Comunidad Zapotal <noreply@comunidadzapotal.org>"

# ---------- Databases: Render Postgres ----------
databases:
  - name: zapotal-db
    plan: basic-256mb
    region: oregon
    # No ipAllowList: por defecto permite todas las conexiones autenticadas.
    # La seguridad viene del usuario/contrasena de la DATABASE_URL.

# ============================================================================
# NOTAS DE USO
# ============================================================================
#
# 1. El backend se construye desde la subcarpeta 'comunidad_zapotal_backend/'
#    gracias a 'rootDir: comunidad_zapotal_backend' en el servicio web.
#
# 2. El PDF worker (Spring Boot) se construye desde spring-services/pdf-worker/
#    usando el Dockerfile multi-stage incluido. Render detecta Docker
#    automaticamente por runtime: docker + dockerfilePath.
#
# 3. Al crear el Blueprint, Render pedira el valor de INTERNAL_API_KEY
#    DOS veces (una para el backend, otra para el PDF worker). Setear
#    el MISMO valor en ambos.
#
# 4. Para popular la base de datos con datos de demo, abrir el Shell de Render
#    en el dashboard y correr:
#        python manage.py seed_all
#    Esto ejecuta 13 seeders en orden (idempotente). Tarda ~1-2 min.
#
# 5. Para crear solo el superuser admin sin popular mas datos:
#        python manage.py seed_superusers --admin-password=MiclaveSegura
#
# 6. Para saltar seeders especificos (ej. no cargar eventos):
#        python manage.py seed_all --skip seed_eventos
#
# 7. Para ejecutar solo un subconjunto (ej. solo configuracion + superuser):
#        python manage.py seed_all --only seed_superusers seed_configuracion
#
# 8. El DATABASE_URL lo inyecta Render automaticamente desde la DB
#    definida en el array 'databases'. No es necesario setearlo manual.
#
# 9. Variables secretas (con sync: false): Render las pedira en el
#    dashboard al crear el Blueprint. Despues se editan desde
#    Environment > Environment Variables del servicio.
#
# 10. El PDF worker usa el dominio por defecto de Render
#     (https://zapotal-pdf-worker.onrender.com). Si quieres un dominio
#     custom, edita PDF_WORKER_URL en el backend tras el primer deploy.
# ============================================================================
