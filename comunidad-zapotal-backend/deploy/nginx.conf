upstream django {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    server_name tudominio.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name tudominio.com;

    ssl_certificate     /etc/ssl/certs/tudominio.crt;
    ssl_certificate_key /etc/ssl/private/tudominio.key;

    client_max_body_size 10M;

    # React SPA
    root /var/www/zapotal/frontend/dist;
    index index.html;

    # Django API
    location /api/ {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Admin
    location /admin/ {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Swagger / Docs
    location /api/schema/ {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Media
    location /media/ {
        alias /var/www/zapotal/backend/media;
    }

    # Static (Django collectstatic)
    location /static/ {
        alias /var/www/zapotal/backend/staticfiles;
    }

    # Static de React (con caché agresivo para assets con hash)
    location /assets/ {
        root /var/www/zapotal/frontend/dist;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA: todas las demás rutas → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
